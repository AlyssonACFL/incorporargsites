<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Copiar Chaves PIX</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
<h1>Escolha a chave</h1>
<div class="container">
    <div class="card">
        <!--<img src="imagens/pix-noivo.png"> -->
        <h2>PIX do Noivo</h2>
        <p>CPF</p>
        <button class="copiar"
                data-pix="12345678900">
            Copiar
        </button>
    </div>


    <div class="card">
        <!--<img src="imagens/pix-noiva.png"> -->
        <h2>PIX da Noiva</h2>
        <p>E-mail</p>
        <button class="copiar"
                data-pix="noiva@email.com">
            Copiar
        </button>
    </div>


    <div class="card">
        <!--<img src="imagens/lista-magalu.png"> -->
        <h2>Código da Lista</h2>
        <p>Magazine Luiza</p>
        <button class="copiar"
                data-pix="ABCD123456">
            Copiar Código
        </button>
    </div>
</div>

<div id="toast">
Copiado!
</div>

<script src="script.js"></script>

</body>
</html>
